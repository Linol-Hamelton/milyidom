services:
  db:
    image: postgis/postgis:16-3.4
    container_name: milyi_dom_db
    environment:
      POSTGRES_DB: milyi_dom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: milyi_dom_redis
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:26.0
    container_name: milyi_dom_typesense
    ports:
      - '127.0.0.1:8108:8108'
    volumes:
      - typesensedata:/data
    command: '--data-dir /data --api-key=milyi-dom-typesense-dev-key --enable-cors'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'bash', '-c', '(echo "GET /health HTTP/1.0"; echo) | bash -c "exec 3<>/dev/tcp/localhost/8108; cat >&3; cat <&3" | grep -q 200']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: milyi_dom_pgbouncer
    environment:
      DB_HOST: db
      DB_PORT: '5432'
      DB_NAME: milyi_dom
      DB_USER: postgres
      DB_PASSWORD: postgres
      POOL_MODE: transaction
      MAX_CLIENT_CONN: '200'
      DEFAULT_POOL_SIZE: '25'
      RESERVE_POOL_SIZE: '5'
      AUTH_TYPE: scram-sha-256
    ports:
      - '127.0.0.1:5433:5432'
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost', '-p', '5432', '-U', 'postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: milyi_dom_backend
    env_file:
      - ./apps/backend/.env
    environment:
      # Route through PgBouncer for connection pooling
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/milyi_dom?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@db:5432/milyi_dom?schema=public
      IMAGES_BASE_URL: http://localhost:4001/images
      IMAGES_ROOT: /app/images
      REDIS_URL: redis://redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: '8108'
      TYPESENSE_API_KEY: milyi-dom-typesense-dev-key
    ports:
      - '127.0.0.1:4001:4001'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./apps/backend/prisma/seed.ts:/app/prisma/seed.ts:ro
      - ./apps/backend/package.json:/app/package.json:ro
      - ./images:/app/images

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001/api}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
        NEXT_PUBLIC_FALLBACK_IMAGE_URL: ${NEXT_PUBLIC_FALLBACK_IMAGE_URL:-/images/listing-1.jpg}
    container_name: milyi_dom_frontend
    env_file:
      - ./apps/frontend/.env.local
    ports:
      - '127.0.0.1:3002:3000'
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: milyi_dom_prometheus
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: milyi_dom_grafana
    ports:
      - '127.0.0.1:3003:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-milyi-dom-grafana}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  typesensedata:
  prometheusdata:
  grafanadata:
